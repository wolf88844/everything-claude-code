<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>Cover B</title>
<style>
*{box-sizing:border-box} html,body{margin:0;width:900px;height:1125px;overflow:hidden} body{font-family:"Segoe UI","PingFang SC",sans-serif;background:linear-gradient(180deg,#191d23 0%,#2b323b 100%);color:#f5f1ea} .cover{position:relative;width:900px;height:1125px;padding:70px 56px} .label{font-size:26px;letter-spacing:.08em;text-transform:uppercase;opacity:.7} .title{margin-top:24px;font-size:86px;line-height:1.04;font-weight:800;letter-spacing:-.05em;max-width:70%;white-space:pre-line} .compare{position:absolute;left:56px;right:56px;bottom:130px;display:grid;grid-template-columns:1fr 1fr;gap:24px} .card{border-radius:28px;padding:30px 26px;min-height:390px} .left{background:rgba(244,180,92,.15);border:2px solid rgba(244,180,92,.35)} .right{background:rgba(146,215,190,.13);border:2px solid rgba(146,215,190,.35)} h4{margin:0 0 18px;font-size:42px;font-weight:700} p{margin:0;font-size:34px;line-height:1.62;white-space:pre-line;opacity:.94} .brand{position:absolute;left:56px;bottom:48px;font-size:26px;opacity:.76}

<div class="cover">
<div class="label">Option B / Mechanism Contrast</div>
<div class="title">你上瘾的
