*{box-sizing:border-box} html,body{margin:0;width:900px;height:1125px;overflow:hidden} body{font-family:"Noto Serif SC","Source Han Serif SC","PingFang SC",serif;background:linear-gradient(180deg,#eef3f8 0%,#d7e1eb 100%);color:#111827} .cover{position:relative;width:900px;height:1125px;padding:70px 58px;overflow:hidden} .label{font-family:"Segoe UI",sans-serif;font-size:26px;letter-spacing:.08em;text-transform:uppercase;opacity:.7} .title{margin-top:20px;font-size:78px;line-height:1.08;font-weight:700;letter-spacing:-.04em;max-width:74%;white-space:pre-line} .desk{position:absolute;left:0;right:0;bottom:0;height:50%;background:linear-gradient(180deg, rgba(10,25,40,0) 0%, rgba(14,29,44,.08) 22%, rgba(14,29,44,.15) 100%)} .laptop{position:absolute;right:48px;bottom:120px;width:360px;height:230px;border-radius:26px 26px 18px 18px;background:#dfe7ef;border:8px solid #314457;box-shadow:0 20px 30px rgba(32,48,64,.18);overflow:hidden} .screen{padding:26px;font-family:"Segoe UI",sans-serif;font-size:30px;line-height:1.6;color:#243447} .screen .tiny{font-size:18px;opacity:.7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px} .notebook{position:absolute;left:62px;bottom:90px;width:280px;height:360px;border-radius:28px;background:#fbfaf6;box-shadow:0 20px 28px rgba(52,66,80,.12);transform:rotate(-7deg);padding:34px 28px;font-family:"Segoe UI",sans-serif} .notebook h5{margin:0 0 22px;font-size:26px;color:#48596b;letter-spacing:.06em;text-transform:uppercase} .line{height:10px;background:#c5d2de;border-radius:999px;margin-bottom:18px;opacity:.85}.short{width:70%}.dot{position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(104,141,177,.18)} .d1{top:122px;right:120px}.d2{top:188px;right:198px} .brand{position:absolute;left:58px;bottom:40px;font-family:"Segoe UI",sans-serif;font-size:26px;opacity:.76}
