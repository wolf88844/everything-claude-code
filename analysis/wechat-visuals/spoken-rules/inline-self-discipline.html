<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Discipline Card</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 900px; height: 1200px; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; background: radial-gradient(circle at 22% 18%, rgba(255,255,255,0.82), rgba(255,255,255,0) 24%), linear-gradient(160deg, #203242 0%, #344a5e 54%, #e2d3bc 100%); color: #f5f2eb; }
    .canvas { position: relative; width: 900px; height: 1200px; padding: 78px 72px; }
    .eyebrow { font-size: 22px; letter-spacing: 0.18em; color: rgba(245, 242, 235, 0.66); }
    .title { margin-top: 28px; width: 680px; font-size: 66px; line-height: 1.14; font-weight: 700; letter-spacing: -0.03em; }
    .panel { margin-top: 82px; width: 520px; border-radius: 34px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); padding: 34px 32px; backdrop-filter: blur(10px); box-shadow: 0 18px 40px rgba(13, 18, 25, 0.22); }
    .panel h2 { margin: 0 0 24px; font-size: 34px; line-height: 1.3; }
    .item { margin-bottom: 22px; font-size: 28px; line-height: 1.5; color: rgba(245, 242, 235, 0.9); }
    .ring { position: absolute; right: 50px; bottom: 150px; width: 290px; height: 290px; border-radius: 50%; border: 1px solid rgba(245,242,235,0.16); box-shadow: inset 0 0 0 46px rgba(245,242,235,0.05); }
    .quote { position: absolute; left: 72px; bottom: 88px; width: 690px; font-size: 30px; line-height: 1.55; color: rgba(245, 242, 235, 0.82); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">文内机制卡 02</div>
    <div class="title">很多公司最强的管理，<br>不是拦住你，而是让你自己先收回去</div>
    <div class="panel">
      <h2>一句轻话，足够完成管理</h2>
      <div class="item">“这个先别提。”</div>
      <div class="item">“这个没必要上会。”</div>
      <div class="item">“这种情况大家一般不这么弄。”</div>
      <div class="item">你不是被正式否决，而是在学会自我规训。</div>
    </div>
    <div class="ring"></div>
    <div class="quote">真正成熟的组织控制，很多时候不是规定你不能，而是让你慢慢学会，你自己就不会了。</div>
  </div>
</body>
</html>
