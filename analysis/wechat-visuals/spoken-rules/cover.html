<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spoken Rules Cover</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 900px;
      height: 383px;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 78% 24%, rgba(236, 230, 219, 0.95), rgba(236, 230, 219, 0) 26%),
        linear-gradient(135deg, #15202c 0%, #253445 42%, #d9c8b1 100%);
      color: #f5f1ea;
    }
    .cover { position: relative; width: 900px; height: 383px; padding: 34px 40px; overflow: hidden; }
    .eyebrow { font-size: 14px; letter-spacing: 0.22em; opacity: 0.68; }
    .title { margin-top: 36px; width: 470px; font-size: 44px; line-height: 1.18; font-weight: 700; letter-spacing: -0.03em; }
    .sub { margin-top: 18px; width: 430px; font-size: 18px; line-height: 1.55; color: rgba(245, 241, 234, 0.8); }
    .brand { position: absolute; left: 40px; bottom: 26px; font-size: 15px; letter-spacing: 0.05em; color: rgba(245, 241, 234, 0.72); }
    .panel { position: absolute; right: 54px; top: 54px; width: 250px; height: 270px; border-radius: 26px; background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 16px 42px rgba(7, 12, 18, 0.24); backdrop-filter: blur(8px); padding: 22px; }
    .panel-title { font-size: 14px; letter-spacing: 0.18em; color: rgba(245, 241, 234, 0.68); }
    .line { height: 12px; border-radius: 999px; background: rgba(245, 241, 234, 0.12); margin-top: 14px; }
    .line.sm { width: 42%; }
    .line.md { width: 76%; }
    .line.lg { width: 92%; }
    .divider { width: 100%; height: 1px; margin: 18px 0 14px; background: rgba(245, 241, 234, 0.12); }
    .stamp { position: absolute; right: -18px; bottom: -22px; width: 124px; height: 124px; border-radius: 50%; border: 1px solid rgba(245, 241, 234, 0.18); background: rgba(11, 18, 25, 0.15); }
    .beam { position: absolute; right: 218px; top: 44px; width: 1px; height: 280px; background: linear-gradient(180deg, rgba(245, 241, 234, 0), rgba(245, 241, 234, 0.38), rgba(245, 241, 234, 0)); opacity: 0.48; }
  </style>
</head>
<body>
  <div class="cover">
    <div class="eyebrow">公众号封面 / 组织边界</div>
    <div class="title">很多公司最真实的制度，<br>不写在系统里</div>
    <div class="sub">它写在领导那句“这种就别提了”里。<br>真正拦住你的，很多时候不是流程，是边界。</div>
    <div class="brand">凶凶熊 · 公众号视觉包装</div>
    <div class="beam"></div>
    <div class="panel">
      <div class="panel-title">REAL SYSTEM</div>
      <div class="line sm"></div>
      <div class="line lg"></div>
      <div class="line md"></div>
      <div class="divider"></div>
      <div class="line md"></div>
      <div class="line lg"></div>
      <div class="line sm"></div>
      <div class="divider"></div>
      <div class="line lg"></div>
      <div class="line md"></div>
      <div class="stamp"></div>
    </div>
  </div>
</body>
</html>
